<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 | 选品雷达</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="category-strip.css" />
    <link rel="stylesheet" href="login/login.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <a class="login-back" href="./">← 返回榜单</a>
      <section class="login-card">
        <a class="brand" href="./"><b>选</b><span><strong>选品雷达</strong><small>PRODUCT RADAR</small></span></a>
        <p class="eyebrow">ACCOUNT ACCESS</p>
        <h1>登录趋势雷达</h1>
        <p>保存常看类目、关注榜单和更新偏好。</p>
        <form id="loginForm">
          <label>账号
            <input id="account" name="account" autocomplete="username" placeholder="请输入手机号或邮箱" required />
          </label>
          <label>密码
            <input name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
          </label>
          <button type="submit">登录并返回榜单</button>
        </form>
        <small>当前为本地演示登录。正式部署时应接入服务端账号系统。</small>
      </section>
    </main>
    <script src="login/login.js"></script>
  </body>
</html>
